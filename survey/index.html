document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ound: radial-gradient(ellipse 80% 60% at 50% 120%, rgba(46,125,52,0.45) 0%, transparent 70%);\n  pointer-events:none;\n}\n.hero-logo{margin-bottom:.8rem}\n.hero-logo img{height:38px;width:auto;filter:brightness(0) invert(1)}\n.hero-eyebrow{\n  display:inline-block;\n  font-size:.78rem;\n  font-weight:600;\n  letter-spacing:.12em;\n  text-transform:uppercase;\n  color:rgba(255,255,255,.5);\n  margin-bottom:1.1rem;\n}\n.hero h1{\n  font-family:'Source Serif 4',serif;\n  font-size:2.7rem;\n  font-weight:600;\n  margin-bottom:.4rem;\n  letter-spacing:-.5px;\n  line-height:1.2;\n}\n.hero h1 em{\n  font-style:normal;\n  color:#81c784;\n}\n.hero .sub{\n  font-size:1.05rem;\n  font-weight:300;\n  color:rgba(255,255,255,.75);\n  margin-bottom:1.8rem;\n  max-width:480px;\n  margin-left:auto;\n  margin-right:auto;\n}\n.hero .badge{\n  display:inline-flex;\n  align-items:center;\n  gap:.4rem;\n  background:rgba(255,255,255,.1);\n  border:1px solid rgba(255,255,255,.2);\n  border-radius:20px;\n  padding:.35rem 1.1rem;\n  font-size:.82rem;\n  font-weight:500;\n  color:rgba(255,255,255,.85);\n}\n.hero .badge::before{\n  content:'';\n  display:inline-block;\n  width:6px;height:6px;\n  border-radius:50%;\n  background:#81c784;\n}\n\n/* ─── LAYOUT ─────────────────────────────────────── */\n.container{max-width:720px;margin:0 auto;padding:2.5rem 1.5rem}\n\n/* ─── TYPOGRAPHY ─────────────────────────────────── */\nh2{\n  font-family:'Source Serif 4',serif;\n  font-size:1.45rem;\n  color:#163d1a;\n  margin:2.8rem 0 .7rem;\n  font-weight:600;\n  letter-spacing:-.2px;\n}\nh3{font-size:1rem;color:#2E7D32;margin:1.5rem 0 .4rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:.85rem}\np{margin-bottom:1rem;font-size:.97rem;color:#2a2a28}\nul{margin:0 0 1rem 1.3rem}\nli{margin-bottom:.5rem;font-size:.95rem;color:#2a2a28}\nli strong{color:#163d1a}\n\n/* ─── WHO BOX ────────────────────────────────────── */\n.who-box{\n  background:#fff;\n  border:1px solid #e0e8dd;\n  border-left:3px solid #2E7D32;\n  padding:1.1rem 1.4rem;\n  border-radius:0 8px 8px 0;\n  margin:1.5rem 0;\n}\n.who-box p{margin-bottom:0;font-size:.88rem;color:#444;line-height:1.65}\n.who-box a{color:#1B5E20;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(27,94,32,.3)}\n.who-box a:hover{border-color:#1B5E20}\n\n/* ─── TABLES ─────────────────────────────────────── */\ntable{width:100%;border-collapse:collapse;margin:1rem 0 1.8rem;font-size:.88rem}\nthead tr{border-bottom:2px solid #163d1a}\nth{text-align:left;padding:.65rem .9rem;font-weight:600;color:#163d1a;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}\ntd{padding:.55rem .9rem;border-bottom:1px solid #ebebeb;color:#333}\ntr:last-child td{border-bottom:none}\ntbody tr:hover td{background:#f5f9f4}\n\n/* ─── VISUALS ────────────────────────────────────── */\n.visual{margin:1.8rem 0;border:1px solid #e0e0dc;border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.05)}\n.visual img{width:100%;display:block}\n.visual .caption{padding:.65rem 1rem;font-size:.82rem;color:#777;background:#fafaf8;border-top:1px solid #ebebeb;font-style:italic}\n\n/* ─── EXAMPLE QUESTIONS ──────────────────────────── */\n.examples{\n  background:#fff;\n  border:1px solid #e0e8dd;\n  border-radius:10px;\n  padding:.4rem 0;\n  margin:1rem 0 1.8rem;\n  overflow:hidden;\n}\n.examples .q{\n  font-style:italic;\n  color:#2a3a2a;\n  padding:.7rem 1.4rem;\n  border-bottom:1px solid #f0f4ef;\n  font-size:.91rem;\n  transition:background .15s;\n}\n.examples .q::before{content:'\"';color:#81c784;font-style:normal;margin-right:.15rem;font-size:1.1em}\n.examples .q::after{content:'\"';color:#81c784;font-style:normal;margin-left:.1rem;font-size:1.1em}\n.examples .q:last-child{border-bottom:none}\n.examples .q:hover{background:#f5f9f4}\n\n/* ─── STATS ──────────────────────────────────────── */\n.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.2rem 0 1.8rem}\n.stat{\n  text-align:center;\n  padding:1.2rem 1rem;\n  background:#fff;\n  border:1px solid #e0e8dd;\n  border-radius:10px;\n  box-shadow:0 1px 6px rgba(0,0,0,.04);\n}\n.stat .num{font-size:1.65rem;font-weight:700;color:#163d1a;letter-spacing:-1px}\n.stat .label{font-size:.78rem;color:#888;margin-top:.25rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em}\n\n/* ─── CTA ────────────────────────────────────────── */\n.cta{\n  text-align:center;\n  margin:3rem 0 1rem;\n  padding:38.4px 32px 28.4px;\n  background:rgb(27,82,33);\n  border-radius:14px;\n  color:#fff;\n}\n.cta p{font-size:1rem;margin-bottom:1.4rem;color:rgba(255,255,255,.85);font-weight:400;max-width:480px;margin-left:auto;margin-right:auto}\n.cta p strong{color:#fff}\n.cta a{\n  display:inline-block;\n  background:#fff;\n  color:#163d1a;\n  padding:.85rem 2.2rem;\n  border-radius:8px;\n  text-decoration:none;\n  font-weight:700;\n  font-size:1rem;\n  transition:all .2s;\n  letter-spacing:.01em;\n}\n.cta a:hover{background:#e8f5e9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}\n.cta .time{font-size:.82rem;color:rgba(255,255,255,.45);margin-top:.9rem}\n\n/* ─── FOOTER ─────────────────────────────────────── */\nfooter{\n  text-align:center;\n  padding:1.5rem;\n  font-size:.78rem;\n  color:#aaa;\n  border-top:1px solid #e8e8e4;\n  margin-top:2rem;\n}\nfooter a{color:#2E7D32;text-decoration:none}\nfooter a:hover{text-decoration:underline}\n\n/* ─── COLLAPSIBLE TABLES ─────────────────────────── */\n.collapsible-table{margin:1rem 0 1.8rem}\n.collapsible-table .extra-row{display:none}\n.collapsible-table.expanded .extra-row{display:table-row}\n.show-more-btn{\n  display:block;width:100%;margin-top:.4rem;\n  background:none;border:1px solid #d0ddd0;border-radius:6px;\n  padding:.45rem 1rem;font-size:.82rem;color:#2E7D32;font-weight:600;\n  cursor:pointer;text-align:center;transition:all .15s;\n  font-family:'Source Sans 3',sans-serif;\n}\n.show-more-btn:hover{background:#f0f7f0;border-color:#2E7D32}\n\n/* ─── ACCORDION SECTIONS ─────────────────────────── */\n.accordion-toggle{\n  display:flex;justify-content:space-between;align-items:center;\n  font-family:'Source Serif 4',serif;font-size:1.45rem;color:#163d1a;\n  font-weight:600;letter-spacing:-.2px;cursor:pointer;\n  margin:0;padding:1.4rem 0 .7rem;border:none;background:none;width:100%;\n  text-align:left;border-top:1px solid #e8e8e4;\n}\n.accordion-toggle:first-child{border-top:none}\n.accordion-toggle .chevron{font-size:.9rem;color:#2E7D32;transition:transform .25s;flex-shrink:0;margin-left:.5rem}\n.accordion-toggle.open .chevron{transform:rotate(180deg)}\n.accordion-body{display:none;padding-bottom:.5rem}\n.accordion-body.open{display:block}\n/* ─── RESPONSIVE ─────────────────────────────────── */\n@media(max-width:600px){\n  .stats{grid-template-columns:1fr}\n  .hero h1{font-size:2rem}\n  .container{padding:2rem 1.2rem}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body data-cc-id=\"cc-1\" style=\"font-size: 1px; background-color: rgb(249, 255, 250); cursor: crosshair;\">\n\n<div class=\"hero\" data-cc-id=\"cc-2\" style=\"height: 250px; padding: 20px 32px 50px;\">\n<div class=\"hero-logo\"><img src=\"acf03d11-7276-458d-a730-c907522d93d7\" alt=\"ClimateSense\"><\u002Fdiv>\n<h1 data-cc-id=\"cc-5\" style=\"\">Evaluating <em data-cc-id=\"cc-7\" style=\"\">LACK<\u002Fem><\u002Fh1>\n<p class=\"sub\" data-cc-id=\"cc-6\" style=\"\"><b>A Database of Climate Lobbying Networks<\u002Fb><\u002Fp>\n<span class=\"badge\" data-cc-id=\"cc-3\" style=\"padding: 4px 17.6px;\">Expert survey &nbsp;·&nbsp; 5–7 minutes<\u002Fspan>\n<\u002Fdiv>\n\n<div class=\"container\" data-cc-id=\"cc-2\" style=\"padding: 20px 24px;\">\n\n<div class=\"who-box\" data-cc-id=\"cc-4\">\n<p data-cc-id=\"cc-1\" style=\"\"><strong>Who we are:<\u002Fstrong> This survey is conducted by the <a href=\"https://climatesense-project.eu\" target=\"_blank\">ClimateSense project<\u002Fa>, a European research initiative (CHIST-ERA, 2025-2028) that develops tools to monitor and analyse climate misinformation. The project brings together researchers from the Open University (UK), EURECOM (France), Prague University of Economics and Business (Czech Republic), and Kaunas University of Technology (Lithuania).<\u002Fp>\n<\u002Fdiv>\n\n<p data-cc-id=\"cc-8\" style=\"\">As part of ClimateSense, we are building a new resource called <strong>LACK<\u002Fstrong> (Lobbying Against Climate Knowledge) and would like your expert opinion on whether it captures the right information and could be useful in practice. You can explore what LACK contains in detail below.<\u002Fp>\n\n<button class=\"accordion-toggle\" onclick=\"toggleAccordion(this)\">What is LACK?<span class=\"chevron\">▼<\u002Fspan><\u002Fbutton>\n<div class=\"accordion-body\">\n<p>LACK is a searchable database that maps the people and organisations involved in lobbying against climate science and climate policy. It brings together information from two well-known investigative sources:<\u002Fp>\n<ul>\n<li><strong>DeSmog Climate Disinformation Database<\u002Fstrong>, which profiles individuals and organisations involved in climate disinformation (943 profile pages)<\u002Fli>\n<li><strong>InfluenceMap / LobbyMap<\u002Fstrong>, which tracks how companies and industry groups engage with climate policy (1,302 entries)<\u002Fli>\n<\u002Ful>\n<p>Instead of reading through hundreds of separate profile pages across different websites, LACK allows you to search and explore the connections between actors in one place.<\u002Fp>\n\n<div class=\"visual\">\n<img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABGQAAAKgCAYAAADd3atdAAAMTWlDQ1BJQ0MgUHJvZmlsZQAASImVVwdYU8kWnltSIQQIREBK6E0QkRJASggt9I4gKiEJEEqMCUHFjiy7gmsXEazoKkXR1RWQxYa6NhbF3hcLKsq6uC525U0IoMu+8r35vrnz33/O/HPOuXPvnQGA3sWXSnNRTQDyJPmy2GB/1uTkFBbpGUCBHiADS2DGF8ilnOjocADLcPv38voaQJTtZQel1j/7/2vREorkAgCQaIjThXJBHsQ/AYC3CqSyfACIUsibz8qXKvFaiHVk0EGIa5Q4U4VblThdhS8O2sTHciF+BABZnc+XZQKg0Qd5VoEgE+rQYbTASSIUSyD2g9gnL2+GEOJFENtAGzgnXanP
